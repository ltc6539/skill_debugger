<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Debugger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Skill Debugger</span>
        </div>
        <div class="topbar-workspaces compact-workspaces">
          <span class="topbar-inline-label">测试空间</span>
          <select id="workspaceSelect" class="workspace-select" aria-label="选择测试空间"></select>
          <div class="section-actions">
            <button id="deleteWorkspaceButton" class="icon-btn danger-icon-btn" title="删除当前空间">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            </button>
            <button id="createWorkspaceButton" class="icon-btn" title="新建空间">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-runtime">
          <a href="/tools" class="topbar-link-btn">工具后台</a>
          <span id="runtimeStatus" class="runtime-tag">检查中</span>
        </div>
      </header>

      <div class="app">
        <!-- LEFT SIDEBAR -->
        <aside class="sidebar">

        <!-- Skill Files -->
        <div class="sidebar-section sidebar-section-grow">
          <div class="section-head">
            <span class="section-label">Skills</span>
            <span id="skillCount" class="badge">0</span>
          </div>
          <p class="section-note">Skill 里的 declared tools 只做说明。真实工具配置和排查，请去工具后台。</p>
          <div id="skillsList" class="tool-list skill-list"></div>
          <form id="uploadForm" class="upload-zone">
            <div class="upload-actions">
              <label class="upload-label">
                <input id="skillFolderFiles" type="file" multiple webkitdirectory directory hidden />
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h5l2 2h11v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 7V5a2 2 0 0 1 2-2h4l2 2"/></svg>
                <span>上传目录</span>
              </label>
              <label class="upload-label">
                <input id="skillFiles" type="file" multiple accept=".md,.zip,text/markdown,application/zip" hidden />
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>上传文件 / zip</span>
              </label>
            </div>
            <div class="upload-hint">支持整个 skill 目录、zip 包，或单个 `SKILL.md`</div>
          </form>
        </div>

        <div class="sidebar-divider"></div>

        <!-- Bottom actions -->
        <div class="sidebar-bottom">
          <a href="/tools" class="sidebar-btn link-btn">打开工具后台</a>
          <button id="clearContextButton" class="sidebar-btn danger-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            清空上下文
          </button>
        </div>
        </aside>

        <!-- CENTER: CHAT -->
        <main class="chat-main">
          <div id="chatLog" class="chat-log"></div>

          <div class="chat-composer">
            <!-- Mode bar -->
            <div class="mode-bar">
              <div class="mode-tabs">
                <label class="mode-tab">
                  <input type="radio" name="mode" value="agent" checked />
                  <span>Agent 路由</span>
                </label>
                <label class="mode-tab">
                  <input type="radio" name="mode" value="forced" />
                  <span>强制 Skill</span>
                </label>
              </div>
              <select id="forcedSkillSelect" class="forced-select" disabled>
                <option value="">选择 skill...</option>
              </select>
            </div>

            <form id="chatForm" class="input-row">
              <textarea id="chatInput" rows="1" placeholder="输入测试问题..."></textarea>
              <button id="sendButton" type="submit" class="send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </form>
          </div>
        </main>

        <!-- RIGHT: TRACE -->
        <aside class="trace-aside">
          <div class="trace-header">
            <span class="section-label">工具调用轨迹</span>
            <span id="turnCount" class="badge">0</span>
          </div>
          <div id="traceLog" class="trace-log"></div>
        </aside>
      </div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
