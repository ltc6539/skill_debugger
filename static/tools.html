<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Debugger Tools Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell admin-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          <span>Skill Debugger</span>
          <span class="topbar-page-tag">Tools Admin</span>
        </div>
        <div class="topbar-workspaces compact-workspaces">
          <span class="topbar-inline-label">测试空间</span>
          <select id="workspaceSelect" class="workspace-select" aria-label="选择测试空间"></select>
          <div class="section-actions">
            <button id="deleteWorkspaceButton" class="icon-btn danger-icon-btn" title="删除当前空间">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            </button>
            <button id="createWorkspaceButton" class="icon-btn" title="新建空间">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-runtime">
          <a href="/" class="topbar-link-btn">返回调试台</a>
          <span id="runtimeStatus" class="runtime-tag">检查中</span>
        </div>
      </header>

      <main class="admin-main">
        <section class="admin-panel">
          <div class="section-head">
            <span class="section-label">Workspace Tools</span>
            <span id="toolCount" class="badge">0</span>
          </div>
          <p class="section-note">这里的 tools 才会真实暴露给 Claude。Google Maps / Yelp 已接 live，其他手动添加的默认按 stub 运行。</p>
          <form id="toolForm" class="tool-form admin-tool-form">
            <input id="toolNameInput" type="text" class="sidebar-input tool-input" placeholder="工具名，例如 REQUEST_CARD_INPUT" />
            <button id="addToolButton" type="submit" class="mini-btn">添加工具</button>
          </form>
          <div class="preset-actions">
            <button id="syncGoogleMapsButton" type="button" class="mini-btn">同步 Google Maps</button>
            <button id="syncYelpButton" type="button" class="mini-btn">同步 Yelp</button>
            <button id="syncAllButton" type="button" class="mini-btn">同步全部预设</button>
          </div>
          <div id="toolsList" class="tool-list admin-tool-list"></div>
        </section>

        <section class="admin-panel">
          <div class="section-head">
            <span class="section-label">Skill 声明了但当前未注册的工具</span>
            <span id="missingCount" class="badge">0</span>
          </div>
          <p class="section-note">这些工具写在 skill 中，但当前 workspace 没有注册，因此 Claude 现在用不到。可以在这里逐个补注册。</p>
          <div id="toolHints" class="tool-hints admin-tool-hints"></div>
        </section>
      </main>
    </div>

    <script src="/static/tools.js" defer></script>
  </body>
</html>
